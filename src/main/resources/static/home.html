<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AImake - 智能建模平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/home.css?v=1.2" rel="stylesheet">
    <style>
        body {
            background: url('assets/images/home.png') no-repeat center center fixed;
            background-size: cover;
            color: #212529 !important;
        }
    </style>
</head>
<body>
<div class="home-wrap text-center">
    <div class="mb-5">
        <h1 class="home-title mb-3">AImake</h1>
        <p class="home-sub mb-0">智能建模平台 · 选择你的学习路径</p>
    </div>

    <div class="choice-grid">
        <a href="supervised.html" class="choice-card text-start">
            <div class="choice-icon mb-2">📊</div>
            <h4 class="mb-2">有监督学习</h4>
            <p class="choice-desc mb-3">预测与分类任务，覆盖数据准备、训练与评估全链路。</p>
            <span class="btn btn-primary">开始建模</span>
        </a>

        <a href="unsupervised.html" class="choice-card text-start">
            <div class="choice-icon mb-2">🔍</div>
            <h4 class="mb-2">无监督学习</h4>
            <p class="choice-desc mb-3">聚类与降维分析，发现数据中的潜在模式。</p>
            <span class="btn btn-danger">开始探索</span>
        </a>

        <div class="choice-card text-start disabled">
            <div class="choice-icon mb-2">🚀</div>
            <h4 class="mb-2">强化学习</h4>
            <p class="choice-desc mb-3">通过与环境的交互来学习最优策略，最大化累积奖励。</p>
            <span class="btn btn-secondary">暂未开放</span>
        </div>
    </div>

    <p class="mt-4 text-secondary small">Java + Python + 原生 HTML</p>
</div>

<script src="assets/js/home.js"></script>
</body>
</html>
