<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Widget</title>
    <link href="assets/css/chat-widget.css?v=1.9" rel="stylesheet">
</head>
<body>

<div class="widget-root">
    <!-- 悬浮球 -->
    <div id="fab" class="fab-ball">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </div>

    <!-- 聊天面板 (默认隐藏) -->
    <div id="panel" class="chat-panel" style="display: none;">
        <div class="chat-header">
            <div class="chat-title">智造小精灵</div>
            <div>
                <button class="chat-header-btn" id="btnNewChat" type="button" title="新对话">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                </button>
                <button class="chat-header-btn" id="btnMinimize" type="button" title="最小化">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
        <!-- 聊天内容区域 -->
        <div class="chat-box" id="chatBox"></div>
        <div class="chat-input-row">
            <input id="chatInput" class="chat-input" type="text" placeholder="输入问题...">
            <button id="btnSendChat" class="chat-send" type="button" title="发送">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
        <div class="chat-status">
            <span id="timeLabel">就绪</span>
            <span id="tokenLabel">Tokens: 0</span>
        </div>
    </div>

    <!-- 新对话确认弹窗（内置，不走浏览器 confirm） -->
    <div id="confirmOverlay" class="confirm-overlay" style="display:none;" aria-hidden="true">
        <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
            <h4 id="confirmTitle" class="confirm-title">开始新对话？</h4>
            <p class="confirm-text">当前对话记录会被清空。</p>
            <div class="confirm-actions">
                <button id="confirmCancel" class="confirm-btn secondary" type="button">取消</button>
                <button id="confirmOk" class="confirm-btn primary" type="button">确认新建</button>
            </div>
        </div>
    </div>
</div>

<script src="assets/js/chat-widget.js?v=1.9"></script>

</body>
</html>
